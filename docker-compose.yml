version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: digital_library_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network

  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: digital_library_app
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8080
      GIN_MODE: release
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads

  networks:
      - backend_network

volumes:
  postgres_data:

networks:
  backend_network:
    driver: bridge